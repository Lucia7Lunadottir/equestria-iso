units:
  - name: "NetworkManager.service"
    action: "enable"
  - name: "systemd-timesyncd.service"
    action: "enable"
  - name: "firewalld.service"
    action: "enable"
  - name: "bluetooth.service"
    action: "enable"
  - name: "fstrim.timer"
    action: "enable"
  - name: "sddm.service"
    action: "enable"
  - name: "power-profiles-daemon.service"
    action: "enable"
  - name: "avahi-daemon.service"
    action: "enable"
  - name: "vboxservice.service"
    action: "enable"
  - name: "vmtoolsd.service"
    action: "enable"
  - name: "pg-gpu-watch.service"
    action: "enable"
  - name: "nvidia-suspend.service"
    action: "enable"
  - name: "nvidia-hibernate.service"
    action: "enable"
  - name: "nvidia-resume.service"
    action: "enable"
  - name: "equestria-keyring-init.service"
    action: "enable"
  - name: "pacman-init"
    action: "disable"
  - name: "etc-pacman.d-gnupg.mount"
    action: "disable"
  - name: "graphical.target"
    action: "set-default"
