dontChroot: false
timeout: 300
script:
    # Определяем GPU и настраиваем правильный драйвер:
    #   - Pascal/Maxwell/Volta  → equestria-nvidia-dkms (проприетарный)
    #   - Turing+               → nvidia-open-dkms (открытый)
    #   - Fermi/Kepler и старше → nouveau (blacklist не создаётся)
    #   - AMD / Intel / нет NVIDIA → тихо пропускается
    #   --32: включает 32-битные библиотеки для Steam/Proton
    - "pg-gpu-sync --auto --32"

i18n:
     name: "Configuring GPU drivers..."
