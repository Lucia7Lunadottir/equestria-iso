dontChroot: false
timeout: 300
script:
    # Определяем GPU и настраиваем правильный драйвер:
    #   - Pascal/Maxwell/Volta/Turing+ → nvidia-open-dkms + blacklist nouveau
    #   - Fermi/Kepler и старше        → nouveau (blacklist не создаётся)
    #   - AMD / Intel / нет NVIDIA     → тихо пропускается
    - "pg-gpu-sync --auto"

i18n:
     name: "Configuring GPU drivers..."
