dontChroot: false
timeout: 120
script:
    # Удаляем папку liveuser СНАЧАЛА — явно и безусловно
    - "-rm -rf /home/liveuser"
    # Потом userdel на случай если запись ещё есть
    - "-userdel -f liveuser"
    # Чистим записи вручную на случай если userdel не справился
    - "-sed -i '/^liveuser:/d' /etc/passwd"
    - "-sed -i '/^liveuser:/d' /etc/shadow"
    - "-sed -i '/^liveuser:/d' /etc/group"
    - "-sed -i '/^liveuser:/d' /etc/gshadow"
    # Удаляем AccountsService запись
    - "-rm -rf /var/lib/AccountsService/users/liveuser"
    # Удаляем файлы установщика
    - "-rm -f /etc/skel/Desktop/install-equestria.desktop"
    - "-rm -f /usr/share/applications/install-equestria.desktop"
    - "-rm -f /usr/local/bin/install-equestria.sh"
    - "-rm -f /home/*/Desktop/install-equestria.desktop"
    # Удаляем SDDM автологин live-сессии
    - "-rm -f /etc/sddm.conf.d/autologin.conf"
    # Удаляем сервис создания liveuser — иначе он запустится при первой загрузке
    # и пересоздаст пользователя, которого мы только что удалили
    - "-rm -f /etc/systemd/system/liveuser-setup.service"
    - "-rm -f /etc/systemd/system/multi-user.target.wants/liveuser-setup.service"
    - "-rm -f /usr/local/bin/eq-liveuser-setup"
    - "-rm -f /etc/sudoers.d/liveuser"
    # Удаляем TTY автологин live-сессии
    - "-rm -f /etc/systemd/system/getty@tty1.service.d/autologin.conf"
    - "-rmdir --ignore-fail-on-non-empty /etc/systemd/system/getty@tty1.service.d"
    # Удаляем хук копирования ядра — он нужен только в live-среде,
    # в установленной системе пакеты linux/linux-lts сами кладут vmlinuz в /boot
    - "-rm -f /etc/pacman.d/hooks/99-copy-vmlinuz.hook"
i18n:
     name: "Cleaning up live environment files..."
