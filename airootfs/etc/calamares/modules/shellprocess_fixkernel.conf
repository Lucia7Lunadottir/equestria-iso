dontChroot: true
timeout: 300
script:
    # 1. Удаляем linux.preset чтобы initcpio не пытался его собирать
    - "-rm -f ${ROOT}/etc/mkinitcpio.d/linux.preset"

    # 2. Удаляем archiso-специфичные конфиги mkinitcpio
    - "-rm -f ${ROOT}/etc/mkinitcpio.conf.d/archiso.conf"
    - "-sed -i 's/archiso/default/g' ${ROOT}/etc/mkinitcpio.d/linux-lts.preset"
    - "-sed -i 's|/etc/mkinitcpio.conf.d/default.conf|/etc/mkinitcpio.conf|g' ${ROOT}/etc/mkinitcpio.d/linux-lts.preset"

    # 3. Копируем ядро на место (только linux-lts, директория содержит '-lts')
    - "find ${ROOT}/usr/lib/modules -maxdepth 2 -path '*-lts/vmlinuz' -exec cp -f {} ${ROOT}/boot/vmlinuz-linux-lts \\;"

    # 4. Удаляем пакет linux (обычное ядро — в системе нужен только lts)
    - "-pacman --root ${ROOT} -Rns --noconfirm linux linux-headers"

    # 5. Удаляем пакеты специфичные для live-окружения и сам установщик
    - "-pacman --root ${ROOT} -Rns --noconfirm mkinitcpio-archiso calamares"

i18n:
     name: "Fixing kernel configuration..."
