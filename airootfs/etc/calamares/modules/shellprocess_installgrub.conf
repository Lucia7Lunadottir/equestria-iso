dontChroot: false
timeout: 600
script:
    # --- UEFI ---

    # 1. Монтируем ESP (только для UEFI; на BIOS упадёт тихо)
    - "-mkdir -p /boot/efi"
    - "-mount /boot/efi"
    - "-mount -t efivarfs efivarfs /sys/firmware/efi/efivars"

    # 2. Устанавливаем GRUB для UEFI (пропускается если не UEFI)
    - "sh -c 'test -d /sys/firmware/efi && grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=EquestriaOS --recheck || exit 0'"

    # --- BIOS/Legacy ---

    # 3. Устанавливаем GRUB для BIOS (пропускается если UEFI)
    - "sh -c 'test ! -d /sys/firmware/efi && grub-install --target=i386-pc /dev/$(lsblk -ndo pkname $(findmnt -n -o SOURCE /)) || exit 0'"

    # --- Общее ---

    # 4. Генерируем конфиг GRUB
    - "grub-mkconfig -o /boot/grub/grub.cfg"

    # 5. Переименовываем запись в UEFI NVRAM: EquestriaOS → Equestria OS (только UEFI)
    - '-sh -c ''efibootmgr | grep -i EquestriaOS | grep -oP "(?<=Boot)[0-9A-Fa-f]+" | head -1 | xargs -I{} efibootmgr -b {} -L "Equestria OS"'''

i18n:
     name: "Installing GRUB bootloader..."
