dontChroot: false
timeout: 300
script:
    # Полностью удаляем старый keyring — иначе кривые права из squashfs ломают GPG
    - "rm -rf /etc/pacman.d/gnupg"
    # Инициализируем чистый keyring
    - "pacman-key --init"
    # Загружаем ключи Arch и Equestria OS
    - "pacman-key --populate archlinux equestria-os"
i18n:
     name: "Initializing package manager keyring..."
