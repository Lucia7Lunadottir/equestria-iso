dontChroot: false
timeout: 120
script:
    # Удаляем gnupg-директорию из live-окружения — она скопировалась через unpackfs
    # с привязкой к временным ключам live-сессии и неверными правами
    - "rm -rf /etc/pacman.d/gnupg"
    # Инициализируем чистый keyring
    - "pacman-key --init"
    # Заполняем стандартными ключами Arch
    - "pacman-key --populate archlinux"
    # Заполняем ключами Equestria OS
    - "-pacman-key --populate equestria-os"
i18n:
     name: "Initializing package manager keyring..."
