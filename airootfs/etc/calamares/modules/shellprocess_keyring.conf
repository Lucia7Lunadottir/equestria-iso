---
dontChroot: true
timeout: 999

script:
  # 1. Sync time to prevent PGP Time Warp (CRC error on keys)
  - "-/usr/bin/timedatectl set-ntp true"

  # 2. Init keyring in Live environment (unset XDG_RUNTIME_DIR to prevent
  #    "keyring is not writable" caused by gpg-agent trying to use /run/user/1000)
  - "/bin/bash -c 'unset XDG_RUNTIME_DIR; unset DBUS_SESSION_BUS_ADDRESS; pacman-key --init'"
  - "/bin/bash -c 'unset XDG_RUNTIME_DIR; pacman-key --populate archlinux equestria-os'"

  # 3. Kill gpg-agent so socket files are removed before copying
  - "-/usr/bin/gpgconf --kill all"

  # 4. Clean target and prepare directory
  - "rm -rf ${ROOT}/etc/pacman.d/gnupg"
  - "mkdir -p ${ROOT}/etc/pacman.d/gnupg"

  # 5. Copy verified Live keyring to target (preserves all UNIX attrs/permissions)
  - "cp -a /etc/pacman.d/gnupg/. ${ROOT}/etc/pacman.d/gnupg/"

  # 6. Finalize trust database inside target
  - "chroot ${ROOT} /bin/bash -c 'unset XDG_RUNTIME_DIR; pacman-key --updatedb'"

  # 7. ФИЗИЧЕСКИ УНИЧТОЖАЕМ Live-костыль в целевой системе
  - "rm -f ${ROOT}/etc/systemd/system/etc-pacman.d-gnupg.mount"

i18n:
  name: "Initializing Equestria OS package manager keyring..."
