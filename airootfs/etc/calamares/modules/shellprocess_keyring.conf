---
dontChroot: true

script:
 - "chmod +x /etc/calamares/scripts/init-pacman-keyring"
 - command: "bash /etc/calamares/scripts/init-pacman-keyring"
   timeout: 1200
 - "rm -rf ${ROOT}/etc/pacman.d/gnupg"
 - "mkdir -p ${ROOT}/etc/pacman.d/"
 - "cp -a /etc/pacman.d/gnupg ${ROOT}/etc/pacman.d/"

i18n:
 name: "Initializing Equestria OS package manager keyring and copying to target..."
