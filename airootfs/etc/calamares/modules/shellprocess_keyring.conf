dontChroot: false
timeout: 300
script:
    # Безопасная очистка примонтированной папки ключей (если существует)
    - "find /etc/pacman.d/gnupg -mindepth 1 -delete 2>/dev/null || true"
    # Инициализируем чистый keyring
    - "pacman-key --init"
    # Загружаем ключи Arch и Equestria OS
    - "pacman-key --populate archlinux equestria-os"
i18n:
     name: "Initializing package manager keyring..."
