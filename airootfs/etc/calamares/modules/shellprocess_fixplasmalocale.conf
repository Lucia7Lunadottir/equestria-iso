dontChroot: false
timeout: 30
script:
    - "sh -c 'LANG_VAL=$(grep \"^LANG=\" /etc/locale.conf 2>/dev/null | cut -d= -f2 | tr -d \"\\\"\"); [ -z \"$LANG_VAL\" ] || [ \"$LANG_VAL\" = \"C\" ] || [ \"$LANG_VAL\" = \"C.UTF-8\" ] && LANG_VAL=en_US.UTF-8; BASE=${LANG_VAL%%.*}; LANGCODE=${BASE%%_*}; mkdir -p /etc/skel/.config; printf \"[Formats]\\nLANG=%s\\n\\n[Translations]\\nLANGUAGE=%s:%s\\n\" \"$LANG_VAL\" \"$BASE\" \"$LANGCODE\" > /etc/skel/.config/plasma-localerc'"

i18n:
     name: "Configuring KDE language..."
