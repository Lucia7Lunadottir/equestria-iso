dontChroot: false
timeout: 600
script:
    # 1. Монтируем ESP через fstab (fstab уже записан к этому моменту)
    - "-mount /boot/efi"

    # 2. Монтируем efivarfs — необходимо для записи NVRAM
    - "-mount -t efivarfs efivarfs /sys/firmware/efi/efivars"

    # 3. Устанавливаем GRUB
    - "grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=EquestriaOS --recheck"

    # 4. Генерируем конфиг GRUB
    - "grub-mkconfig -o /boot/grub/grub.cfg"

i18n:
     name: "Installing GRUB bootloader..."
