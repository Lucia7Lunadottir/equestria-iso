dontChroot: false
timeout: 120
script:
    # Удаляем liveuser полностью
    - "-userdel -f -r liveuser"
    - "-rm -rf /home/liveuser"
    # Чистим записи из системных файлов на случай если userdel не справился
    - "-sed -i '/^liveuser:/d' /etc/passwd"
    - "-sed -i '/^liveuser:/d' /etc/shadow"
    - "-sed -i '/^liveuser:/d' /etc/group"
    - "-sed -i '/^liveuser:/d' /etc/gshadow"
    # Удаляем AccountsService запись liveuser
    - "-rm -rf /var/lib/AccountsService/users/liveuser"
    # Удаляем файлы установщика
    - "-rm -f /etc/skel/Desktop/install-equestria.desktop"
    - "-rm -f /usr/share/applications/install-equestria.desktop"
    - "-rm -f /usr/local/bin/install-equestria.sh"
    - "-rm -f /home/*/Desktop/install-equestria.desktop"
    # Удаляем SDDM автологин live-сессии
    - "-rm -f /etc/sddm.conf.d/autologin.conf"
    - "-rm -f /etc/sddm.conf.d/kde_settings.conf"
i18n:
     name: "Cleaning up live environment files..."
