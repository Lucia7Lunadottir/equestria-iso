dontChroot: true
timeout: 300
script:
    # 1. Удаляем archiso-специфичные конфиги mkinitcpio
    - "-rm -f ${ROOT}/etc/mkinitcpio.conf.d/archiso.conf"
    - "-sed -i 's/archiso/default/g' ${ROOT}/etc/mkinitcpio.d/linux.preset"
    - "-sed -i 's|/etc/mkinitcpio.conf.d/default.conf|/etc/mkinitcpio.conf|g' ${ROOT}/etc/mkinitcpio.d/linux.preset"

    # 2. Копируем ядро на место
    - "-cp -f ${ROOT}/usr/lib/modules/*/vmlinuz ${ROOT}/boot/vmlinuz-linux"

    # 3. Удаляем пакеты специфичные для live-окружения и сам установщик
    - "-pacman --root ${ROOT} -Rns --noconfirm mkinitcpio-archiso calamares"

i18n:
     name: "Fixing kernel configuration..."
